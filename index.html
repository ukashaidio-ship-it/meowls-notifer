<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meowl Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0b0b0f;color:#fff;display:flex}
.sidebar{width:230px;height:100vh;background:#111217;border-right:1px solid #1f1f1f;padding:20px}
.logo{font-weight:800;font-size:20px;margin-bottom:30px}
.nav a{display:block;padding:12px;border-radius:10px;color:#aaa;text-decoration:none;margin-bottom:8px}
.nav a:hover{background:#1a1b22;color:#fff}
.main{flex:1;padding:30px}
.panel{background:#14151c;padding:25px;border-radius:16px;border:1px solid #1f1f1f}
.slot{background:#0f1015;border:1px solid #1f1f1f;padding:15px;border-radius:12px;margin-bottom:15px}
button{margin-top:10px;padding:8px 12px;border:none;border-radius:8px;background:#fff;color:#000;cursor:pointer}
.active{color:#22c55e}
.open{color:#aaa}
.logs{font-size:28px;margin-bottom:20px}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">🐱 MEOWL</div>
</div>

<div class="main">

<div class="panel">
<h2>Logs: <span id="logs">0</span></h2>

<div id="slots"></div>

</div>

</div>

<script>
let logs = localStorage.getItem("logs") || 0;
logs = parseInt(logs);

setInterval(()=>{
  logs++;
  document.getElementById("logs").innerText = logs;
  localStorage.setItem("logs", logs);
},1000);

function createSlot(id){
  return `
  <div class="slot" id="slot${id}">
    <div>SLOT #${id} - <span class="status open">OPEN</span></div>
    <div class="info">Available</div>
    <button onclick="activate(${id})">Activate</button>
    <button onclick="resetSlot(${id})">Reset</button>
  </div>`
}

const slotsDiv = document.getElementById("slots");
for(let i=1;i<=5;i++){
  slotsDiv.innerHTML += createSlot(i);
}

function activate(id){
  let name = prompt("Enter buyer username:");
  if(!name) return;

  let end = Date.now() + 86400000; // 24h

  const slot = document.getElementById("slot"+id);
  slot.querySelector(".status").innerText = "ACTIVE";
  slot.querySelector(".status").className = "status active";
  slot.querySelector(".info").innerText = "User: " + name;

  localStorage.setItem("slot"+id, JSON.stringify({active:true,user:name,end:end}))
}

function resetSlot(id){
  const slot = document.getElementById("slot"+id);
  slot.querySelector(".status").innerText = "OPEN";
  slot.querySelector(".status").className = "status open";
  slot.querySelector(".info").innerText = "Available";

  localStorage.removeItem("slot"+id)
}

function updateSlots(){
  for(let i=1;i<=5;i++){
    let data = localStorage.getItem("slot"+i);
    if(data){
      data = JSON.parse(data);
      const slot = document.getElementById("slot"+i);

      if(Date.now() > data.end){
        resetSlot(i);
      } else {
        let remaining = Math.floor((data.end - Date.now())/1000);
        let h = Math.floor(remaining/3600);
        let m = Math.floor((remaining%3600)/60);
        let s = remaining%60;

        slot.querySelector(".status").innerText = "ACTIVE";
        slot.querySelector(".status").className = "status active";
        slot.querySelector(".info").innerText = `User: ${data.user} | ${h}h ${m}m ${s}s`;
      }
    }
  }
}

setInterval(updateSlots,1000);
updateSlots();
</script>

</body>
</html>
